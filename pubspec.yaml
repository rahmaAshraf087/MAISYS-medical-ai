name: maisys
description: "Medical AI System for Trusted Health Guidance - A Flutter mobile application."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # Storage
  shared_preferences: ^2.2.2

  # HTTP & API
  http: ^1.1.0

  # File Picking
  image_picker: ^1.2.1
  file_picker: ^10.3.10

  # URL Launcher
  url_launcher: ^6.3.2

  # Cupertino Icons
  cupertino_icons: ^1.0.8

  # SVG Support
  flutter_svg: ^2.2.3

  # UI Enhancements
  smooth_page_indicator: ^1.0.0+2
  share_plus: ^7.2.1
  country_code_picker: ^3.0.0






dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/svgs/main_logo/appicon2.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:

  uses-material-design: true

  assets:
    - assets/svgs/appbar_logo/
    - assets/svgs/main_logo/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/outfit/Outfit-VariableFont_wght.ttf
    - family: IBM_Plex_Sans_Arabic
      fonts:
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-Regular.ttf
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-Bold.ttf
          weight: 700
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #

